<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MoeGo GTM OS</title>

<!-- React + Babel (cdnjs, works in Claude preview and GitHub Pages) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>

<!-- Firebase (loads on a real host; preview falls back to local-only mode automatically) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- Source Sans 3 (Toast's body typeface) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  /* Seattle Kraken: Deep Sea Blue (#001628) base, Boundless/Ice Blue accents, Red Alert (#E9072B) */
  --deep:#001628; --deep-2:#022f4c;
  --navy:#013a5e; --navy-700:#0a4d76; --navy-600:#14618f;
  --blue:#0f5a82; --blue-500:#176d9c; --sky:#5cb4dc;
  --boundless:#88d0ec; --ice:#99d9d9;
  --sky-300:#9fd4ea; --sky-200:#c4e6f5; --sky-100:#e3f2fb; --sky-50:#f1f8fd;
  --ice-bg:#e9f6f6;
  --bg:#e8f1fb; --panel:#ffffff; --panel-2:#f6fafd;
  --line:#e2ecf3; --line-strong:#ccdded;
  --ink:#03243c; --ink-soft:#2e4f68; --muted:#5f7a8c; --muted-2:#8fa6b4;
  --green:#11936a; --green-bg:#e3f5ee;
  --amber:#c2820f; --amber-bg:#fbefd6;
  --red:#e9072b; --red-bg:#fde2e6;
  --grey:#7e96a6; --grey-bg:#eef3f7;
  --shadow:0 1px 2px rgba(0,22,40,.05), 0 6px 20px rgba(0,22,40,.06);
  --shadow-lg:0 16px 48px rgba(0,22,40,.20);
  --r:12px; --r-sm:8px; --r-lg:16px;
  --side:240px;
  --font:'Source Sans 3',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--blue);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#d3e0ea;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#bcccda}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh}
.side{width:var(--side);flex:0 0 var(--side);background:linear-gradient(180deg,#001628 0%, #022f4c 100%);color:#dce9f8;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:18px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#88d0ec,#0a4d76);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
.brand b{font-size:15px;color:#fff;letter-spacing:-.2px;display:block;line-height:1.1}
.brand small{font-size:11px;color:#8fc4e6;letter-spacing:.3px}
.nav{padding:10px 10px;flex:1;overflow:auto}
.nav .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.9px;color:#7fb2d8;padding:14px 10px 6px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;color:#cfe2f3;font-weight:500;font-size:13.5px;margin:1px 0;cursor:pointer;transition:background .12s,color .12s;border:1px solid transparent}
.nav a .ic{width:17px;text-align:center;opacity:.92;font-size:14px}
.nav a:hover{background:rgba(136,208,236,.12);color:#fff}
.nav a.on{background:rgba(136,208,236,.20);color:#fff;border-color:rgba(136,208,236,.36)}
.nav a .badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;font-size:10.5px;font-weight:700;padding:1px 7px;min-width:18px;text-align:center}
.nav a.on .badge,.nav a:hover .badge{}
.side .who{border-top:1px solid rgba(255,255,255,.08);padding:11px 13px;display:flex;align-items:center;gap:9px;font-size:12.5px}
.side .who .av{flex:0 0 auto}
.side .who .meta{min-width:0}
.side .who .meta b{color:#fff;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side .who .meta span{color:#8fc4e6;font-size:11px}
.side .who button{margin-left:auto;background:transparent;border:1px solid rgba(255,255,255,.18);color:#bcd5f0;border-radius:7px;padding:4px 8px;font-size:11px}
.side .who button:hover{background:rgba(255,255,255,.08)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{position:sticky;top:0;z-index:30;background:rgba(232,240,251,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 32px 16px;display:flex;flex-direction:column;align-items:stretch;gap:13px}
.top-row{display:flex;align-items:center;gap:16px}
.top h1{font-size:21px;margin:0;letter-spacing:-.4px;font-weight:700;color:var(--ink)}
.top .sub{color:var(--muted);font-size:13px;margin-top:2px}
.top .sync{margin-left:auto;display:flex;align-items:center;gap:9px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sync .pill{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--ink-soft);font-weight:500}
.content{padding:30px 32px 100px;max-width:none;width:100%}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line-strong);color:var(--ink-soft);border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;transition:.12s}
.btn:hover{background:var(--sky-50);border-color:var(--sky-300)}
.btn.primary{background:linear-gradient(180deg,var(--blue-500),var(--blue));border-color:var(--blue);color:#fff;box-shadow:0 1px 2px rgba(18,48,90,.18)}
.btn.primary:hover{background:linear-gradient(180deg,var(--blue),var(--navy-600));border-color:var(--navy-600)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--blue)}
.btn.ghost:hover{background:var(--sky-100)}
.btn.danger{color:var(--red);border-color:#eccaca}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.icon{padding:7px 9px}
.btn[disabled]{opacity:.5;cursor:not-allowed}

/* ---------- Cards / panels ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.row{display:flex;gap:16px}
.grid{display:grid;gap:16px}
.muted{color:var(--muted)}
.tiny{font-size:11.5px}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;margin:0 0 10px}

/* ---------- Pills / chips ---------- */
.pill-s{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 9px;font-size:11.5px;font-weight:650;white-space:nowrap;border:1px solid transparent}
.s-green{background:var(--green-bg);color:#137a50;border-color:#c6ecd9}
.s-amber{background:var(--amber-bg);color:#9a6608;border-color:#f0deb5}
.s-red{background:var(--red-bg);color:#b23838;border-color:#f1c9c9}
.s-grey{background:var(--grey-bg);color:#54697d;border-color:#dde6ef}
.s-blue{background:var(--sky-100);color:#0b4d76;border-color:var(--sky-200)}
.s-navy{background:#d8e9f4;color:var(--navy);border-color:#bad7e8}
.hdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px rgba(0,0,0,.04)}
.pill-s.click{cursor:pointer;transition:box-shadow .12s,filter .12s}
.pill-s.click:hover{box-shadow:0 0 0 2px rgba(0,22,40,.12);filter:saturate(1.1)}

/* ---------- Disclosure (collapsible) ---------- */
.disc{border-top:1px solid var(--line)}
.disc-head{display:flex;align-items:center;gap:9px;padding:13px 2px;cursor:pointer;user-select:none}
.disc-head:hover .disc-title{color:var(--navy)}
.disc-title{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700;transition:color .12s}
.disc-count{font-size:11px;font-weight:700;color:var(--navy);background:var(--sky-100);border:1px solid var(--sky-200);border-radius:20px;padding:1px 8px}
.disc-chev{margin-left:auto;color:var(--muted-2);font-size:12px;transition:transform .18s ease}
.disc-chev.open{transform:rotate(90deg)}
.disc-body{padding:2px 2px 14px}

/* ---------- Target label ---------- */
.target{display:inline-flex;flex-direction:column;align-items:center;line-height:1.1}
.okr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(460px,1fr));gap:18px;align-content:start}
.okr-grid>.card{display:flex;flex-direction:column}
@media(max-width:980px){.okr-grid{grid-template-columns:1fr}}
.target .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted-2);font-weight:700}
.target .val{font-size:13.5px;font-weight:800;color:var(--navy);letter-spacing:-.1px}

/* ---------- Global search ---------- */
.search-wrap{position:relative;width:100%;max-width:none;min-width:0}
.search-inp{width:100%;border:1px solid var(--line-strong);border-radius:11px;padding:11px 14px 11px 40px;background:var(--panel);color:var(--ink);outline:none;font-size:14.5px;transition:.12s}
.search-inp:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(136,208,236,.30)}
.search-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted-2);font-size:15px;pointer-events:none;opacity:.7}
.search-pop{position:absolute;top:calc(100% + 8px);left:0;width:min(720px,calc(100vw - 40px));background:var(--panel);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-lg);max-height:66vh;overflow-y:auto;overflow-x:hidden;z-index:60;padding:8px}
.search-grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted-2);font-weight:700;padding:10px 12px 5px}
.search-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;cursor:pointer}
.search-item:hover{background:var(--sky-50)}
.search-item .si-t{flex:1 1 auto;min-width:0;font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-item .si-k{flex:0 0 auto;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted-2)}
.search-empty{padding:20px 14px;text-align:center;color:var(--muted);font-size:13.5px}
.av img{width:100%;height:100%;object-fit:cover;display:block}

/* ---------- Avatars ---------- */
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;letter-spacing:.2px;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
.av.lg{width:34px;height:34px;font-size:13px}
.av.md{width:30px;height:30px;font-size:12px}
.av.xl{width:58px;height:58px;font-size:20px;border-radius:50%}
.av.sm{width:21px;height:21px;font-size:9.5px}
.av-stack{display:inline-flex}
.av-stack .av{margin-left:-7px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25),0 0 0 2px var(--panel)}
.av-stack .av:first-child{margin-left:0}

/* ---------- Tables ---------- */
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:1}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background .1s}
.tbl tbody tr:hover{background:var(--sky-50)}
.tbl .title-cell{font-weight:650;color:var(--ink)}
.tbl .title-cell small{display:block;font-weight:500;color:var(--muted);font-size:11.5px;margin-top:2px}

/* ---------- Forms ---------- */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:650;color:var(--ink-soft);margin-bottom:5px}
.field .hint{font-weight:500;color:var(--muted-2);font-size:11px;margin-left:6px}
.inp,select.inp,textarea.inp{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:9px 11px;background:var(--panel);color:var(--ink);transition:.12s;outline:none}
.inp:focus,textarea.inp:focus,select.inp:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(94,169,230,.22)}
textarea.inp{resize:vertical;min-height:62px;line-height:1.5}
.inp::placeholder{color:#a8bccf}
.f-row{display:flex;gap:12px}
.f-row>*{flex:1}
.chk-grid{display:flex;flex-wrap:wrap;gap:7px}
.chk{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line-strong);border-radius:20px;padding:5px 11px 5px 9px;font-size:12.5px;cursor:pointer;background:var(--panel);user-select:none;font-weight:550;color:var(--ink-soft)}
.chk:hover{border-color:var(--sky-300);background:var(--sky-50)}
.chk.on{background:var(--sky-100);border-color:var(--sky);color:var(--navy-700)}
.chk input{display:none}
.seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden;background:var(--panel)}
.seg button{border:none;background:transparent;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--muted);border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--navy);color:#fff}

/* ---------- Modal / Drawer ---------- */
.scrim{position:fixed;inset:0;background:rgba(15,36,61,.42);backdrop-filter:blur(2px);z-index:60;display:flex;animation:fade .14s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{margin:auto;background:var(--panel);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:min(560px,94vw);max-height:90vh;overflow:auto;animation:pop .16s ease}
@keyframes pop{from{transform:translateY(8px) scale(.99);opacity:.6}to{transform:none;opacity:1}}
.modal .mh{padding:18px 20px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.modal .mh h3{margin:0;font-size:16px;letter-spacing:-.2px}
.modal .mb{padding:18px 20px}
.modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--panel-2);border-radius:0 0 var(--r-lg) var(--r-lg);position:sticky;bottom:0}
.x{margin-left:auto;border:none;background:transparent;color:var(--muted);font-size:20px;line-height:1;padding:2px 6px;border-radius:6px}
.x:hover{background:var(--sky-100);color:var(--ink)}

.drawer-scrim{position:fixed;inset:0;background:rgba(15,36,61,.34);z-index:55;animation:fade .14s ease}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(640px,96vw);background:var(--panel);box-shadow:var(--shadow-lg);z-index:56;display:flex;flex-direction:column;animation:slide .2s cubic-bezier(.2,.8,.2,1)}
@keyframes slide{from{transform:translateX(40px);opacity:.4}to{transform:none;opacity:1}}
.drawer .dh{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
.drawer .db{padding:20px 22px;overflow:auto;flex:1}
.crumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:4px}
.crumb a{cursor:pointer;color:var(--blue)}
.crumb a:hover{text-decoration:underline}

/* ---------- Misc layout helpers ---------- */
.kv{display:grid;grid-template-columns:118px 1fr;gap:8px 14px;align-items:start;font-size:13px}
.kv .k{color:var(--muted);font-weight:600;font-size:12px;padding-top:2px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
.stat .n{font-size:26px;font-weight:780;letter-spacing:-.6px;line-height:1}
.stat .l{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:7px}
.stat.alert .n{color:var(--red)}
.stat.warn .n{color:var(--amber)}
.stat.good .n{color:var(--green)}
.bar{height:7px;border-radius:6px;background:var(--sky-100);overflow:hidden}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--blue-500),var(--sky))}
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .big{font-size:30px;margin-bottom:8px}
.tag-due{font-weight:650}
.tag-due.over{color:var(--red)}
.tag-due.soon{color:var(--amber)}
.flag{display:inline-flex;align-items:center;gap:6px;background:var(--red-bg);color:#b23838;border:1px solid #f1c9c9;border-radius:8px;padding:7px 11px;font-size:12.5px;font-weight:600}
.note{border-left:3px solid var(--sky);background:var(--sky-50);padding:9px 12px;border-radius:0 8px 8px 0;font-size:13px}
.linkish{cursor:pointer;color:var(--blue);font-weight:600}
.linkish:hover{text-decoration:underline}
.hl{background:linear-gradient(180deg,transparent 60%,#fff2c4 60%)}
.divider{height:1px;background:var(--line);margin:18px 0}
.banner{background:#fff7e6;border:1px solid #f3e2bb;color:#8a6516;border-radius:10px;padding:10px 14px;font-size:12.5px;display:flex;align-items:center;gap:10px}
.banner.info{background:var(--sky-50);border-color:var(--sky-200);color:#1d5896}

/* next steps */
.ns{display:flex;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line)}
.ns:last-child{border-bottom:none}
.ns .box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line-strong);flex:0 0 auto;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:12px;background:var(--panel)}
.ns .box.done{background:var(--green);border-color:var(--green)}
.ns .body{flex:1;min-width:0}
.ns .body .t{font-weight:550}
.ns .body.done .t{text-decoration:line-through;color:var(--muted)}
.ns .meta-line{font-size:11px;color:var(--muted-2);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}

/* setup screen */
.setup-wrap{max-width:720px;margin:40px auto;padding:0 20px}
.steps{counter-reset:s}
.step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.step .num{counter-increment:s;flex:0 0 28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.step .num::before{content:counter(s)}
.step h4{margin:2px 0 4px;font-size:14px}
.code{background:#0f243d;color:#cfe3fb;border-radius:8px;padding:11px 13px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;overflow:auto;white-space:pre;margin:8px 0}

@media (max-width:860px){
  :root{--side:0px}
  .side{position:fixed;left:0;top:0;z-index:80;width:230px;transform:translateX(-100%);transition:transform .2s}
  .side.open{transform:none}
  .menu-btn{display:inline-flex!important}
  .content{padding:16px 14px 90px}
  .top{padding:12px 14px}
  .f-row{flex-direction:column}
}
.menu-btn{display:none;border:1px solid var(--line-strong);background:var(--panel);border-radius:8px;padding:7px 10px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const FIREBASE_CONFIG = {

function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d.length<=10 ? d+'T00:00:00' : d);
  if(isNaN(dt)) return '';
  return dt.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
}
function fmtDateShort(d){
  if(!d) return '';
  const dt = new Date(d.length<=10 ? d+'T00:00:00' : d);
  if(isNaN(dt)) return '';
  return dt.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function daysFromNow(d){
  if(!d) return null;
  const dt = new Date(d.length<=10 ? d+'T00:00:00' : d);
  if(isNaN(dt)) return null;
  const ms = dt - new Date(todayStr()+'T00:00:00');
  return Math.round(ms/86400000);
}
function relTime(iso){
  if(!iso) return 'never';
  const diff = Date.now() - new Date(iso).getTime();
  const d = Math.floor(diff/86400000);
  if(d<=0){ const h=Math.floor(diff/3600000); if(h<=0){const m=Math.floor(diff/60000); return m<=1?'just now':m+'m ago';} return h+'h ago';}
  if(d===1) return 'yesterday';
  if(d<30) return d+'d ago';
  return fmtDateShort(iso);
}
function isOverdue(d, status){ if(status==='done'||!d) return false; const n=daysFromNow(d); return n!==null && n<0; }
function isStale(lastActivity, status){ if(status==='done'||!lastActivity) return status!=='done' && !lastActivity; const diff=Date.now()-new Date(lastActivity).getTime(); return diff > STALE_DAYS*86400000; }

/* ============================================================
   Accountability grade  (A-F, cheat-resistant)
   - Live: overdue items, stale / no-next-step tasks
   - History (90d): late completions, and date PUSHES (weighted heaviest)
   - Pulling a date earlier is free; pushing it out costs you even if you hit the new date
   - Forgiving of one slip; strict on patterns
   ============================================================ */
function gradeFor(pid, projects, tasks, events){
  const myP=projects.filter(p=>p.ownerId===pid);
  const myT=tasks.filter(t=>(t.ownerIds||[]).includes(pid));
  const items=[...myP,...myT];
  if(items.length===0) return {grade:'\u2014',na:true,total:0,overdue:0,hygiene:0,late:0,pushCount:0,pushDays:0,activeItems:0,items:0};
  const activeItems=items.filter(x=>x.status!=='done');
  const activeTasks=myT.filter(t=>t.status!=='done');
  const overdue=activeItems.filter(x=>isOverdue(x.dueDate,x.status)).length;
  const hygiene=activeTasks.filter(t=>(t.nextSteps||[]).filter(n=>!n.done).length===0 || isStale(t.lastActivity,t.status)).length;
  const cutoff=Date.now()-90*86400000;
  const ids=new Set(items.map(x=>x.id));
  const evs=(events||[]).filter(e=>ids.has(e.entityId) && new Date(e.ts).getTime()>=cutoff);
  const pushes=evs.filter(e=>e.type==='date_change' && e.meta && e.meta.dir==='push');
  const pushCount=pushes.length;
  const pushDays=pushes.reduce((a,e)=>a+((e.meta&&e.meta.days)||0),0);
  const late=evs.filter(e=>e.type==='completed' && e.meta && e.meta.onTime===false).length;
  const honest=overdue*2 + hygiene*1 + late*1.5;
  const forgiveness=1.5 + Math.min(2, 0.3*activeItems.length);
  const integrity=pushCount*2 + Math.floor(pushDays/14)*1;
  const total=Math.max(0, honest-forgiveness)+integrity;
  const grade= total<1?'A': total<3?'B': total<5?'C': total<7.5?'D':'F';
  return {grade,na:false,total:Math.round(total*10)/10,overdue,hygiene,late,pushCount,pushDays,activeItems:activeItems.length,items:items.length};
}
function gradeMeta(letter){
  return ({A:{color:'#11936a'},B:{color:'#3a9d57'},C:{color:'#c2820f'},D:{color:'#d2761a'},F:{color:'#e9072b'}})[letter]||{color:'#7e96a6'};
}
function GradeBadge({letter,size}){
  const m=gradeMeta(letter); const S=size||46;
  return React.createElement('div',{style:{width:S,height:S,borderRadius:'50%',flex:'0 0 auto',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:Math.round(S*0.44),color:'#fff',background:m.color,boxShadow:'inset 0 0 0 1px rgba(255,255,255,.3), 0 2px 6px rgba(0,22,40,.18)'}}, letter);
}

/* ============================================================
   Data + sync layer  (Firebase Realtime DB  ->  localStorage fallback)
   ============================================================ */
const LS_KEY = 'moego_gtm_os_v1';
const LS_ME  = 'moego_gtm_os_me';
const LS_CFG = 'moego_gtm_os_cfg';      // browser-pasted firebase config (test mode)
const DB_ROOT = 'moego_gtm';
const COLLS = ['people','okrs','projects','tasks'];

function loadLocal(){
  try{ const raw = localStorage.getItem(LS_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return null;
}
function saveLocal(state){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
}
function getPastedConfig(){
  try{ const r = localStorage.getItem(LS_CFG); if(r){ return JSON.parse(r); } }catch(e){}
  return null;
}
function effectiveConfig(){
  if(FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.databaseURL) return FIREBASE_CONFIG;
  const pasted = getPastedConfig();
  if(pasted && pasted.apiKey && pasted.databaseURL) return pasted;
  return null;
}
const firebaseAvailable = (typeof firebase !== 'undefined');

function arrToMap(arr){ const m={}; (arr||[]).forEach(x=>{ if(x&&x.id) m[x.id]=x; }); return m; }
function mapToArr(m){ return m ? Object.keys(m).map(k=>m[k]) : []; }
function blankState(){ return {meta:{appTitle:'MoeGo GTM OS'},people:[],okrs:[],projects:[],tasks:[],events:[]}; }
function freshSeed(){ return JSON.parse(JSON.stringify(SEED)); }

const Store = createContext(null);
const useStore = () => useContext(Store);

function StoreProvider({children}){
  const [mode, setMode] = useState('boot');      // boot | local | auth | denied | cloud
  const [user, setUser] = useState(null);
  const [state, setState] = useState(blankState);
  const [me, setMe] = useState(()=>{ try{return localStorage.getItem(LS_ME)||'';}catch(e){return '';} });
  const [sync, setSync] = useState('local');     // local | live | connecting | error
  const [toast, setToast] = useState(null);
  const dbRef = useRef(null);
  const cfg = useMemo(()=>effectiveConfig(),[]);

  const flash = useCallback((m)=>{ setToast(m); setTimeout(()=>setToast(null), 2600); },[]);

  // ---- init ----
  useEffect(()=>{
    let cancelled=false;
    if(!cfg || !firebaseAvailable){
      const local = loadLocal() || freshSeed();
      setState(local); setMode('local'); setSync('local');
      return;
    }
    try{
      if(!firebase.apps.length) firebase.initializeApp(cfg);
      const auth = firebase.auth();
      setMode('auth'); setSync('connecting');
      const unsub = auth.onAuthStateChanged(u=>{
        if(cancelled) return;
        if(!u){ setUser(null); setMode('auth'); return; }
        const email=(u.email||'').toLowerCase();
        if(ALLOWED_EMAILS.length && !ALLOWED_EMAILS.includes(email)){ setUser(u); setMode('denied'); return; }
        setUser(u);
        const ref = firebase.database().ref(DB_ROOT);
        dbRef.current = ref;
        ref.once('value').then(snap=>{
          if(!snap.exists()){
            const seed = freshSeed();
            ref.set({ meta:seed.meta, people:arrToMap(seed.people), okrs:arrToMap(seed.okrs), projects:arrToMap(seed.projects), tasks:arrToMap(seed.tasks), events:arrToMap(seed.events||[]) });
          }
        });
        ref.on('value', snap=>{
          const v = snap.val()||{};
          setState({ meta:v.meta||{appTitle:'MoeGo GTM OS'}, people:mapToArr(v.people), okrs:mapToArr(v.okrs), projects:mapToArr(v.projects), tasks:mapToArr(v.tasks), events:mapToArr(v.events) });
          setMode('cloud'); setSync('live');
        }, err=>{ console.error(err); setSync('error'); });
      });
      return ()=>{ cancelled=true; unsub&&unsub(); if(dbRef.current) dbRef.current.off(); };
    }catch(e){
      console.error('Firebase init failed, using local mode', e);
      const local = loadLocal() || freshSeed();
      setState(local); setMode('local'); setSync('local');
    }
  },[cfg]);

  useEffect(()=>{ try{ localStorage.setItem(LS_ME, me);}catch(e){} },[me]);

  const signIn = useCallback(()=>{
    try{
      const provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider).catch(e=>flash('Sign-in failed: '+e.message));
    }catch(e){ flash('Auth not ready'); }
  },[flash]);
  const signOut = useCallback(()=>{ try{ firebase.auth().signOut(); }catch(e){} },[]);

  // ---- writes ----
  const persist = useCallback((next)=>{ if(mode!=='cloud') saveLocal(next); },[mode]);

  const writeEntity = useCallback((coll, obj)=>{
    if(mode==='cloud' && dbRef.current){ dbRef.current.child(coll).child(obj.id).set(obj); }
    else setState(s=>{ const arr=s[coll].some(x=>x.id===obj.id)? s[coll].map(x=>x.id===obj.id?obj:x) : [...s[coll],obj]; const next={...s,[coll]:arr}; saveLocal(next); return next; });
  },[mode]);

  const writeMany = useCallback((entries)=>{ // entries: [{coll,obj}]
    if(mode==='cloud' && dbRef.current){ entries.forEach(({coll,obj})=> dbRef.current.child(coll).child(obj.id).set(obj)); }
    else setState(s=>{ let next={...s}; entries.forEach(({coll,obj})=>{ const arr=next[coll].some(x=>x.id===obj.id)? next[coll].map(x=>x.id===obj.id?obj:x):[...next[coll],obj]; next={...next,[coll]:arr}; }); saveLocal(next); return next; });
  },[mode]);

  const deleteEntity = useCallback((coll, id, alsoWrite=[])=>{
    if(mode==='cloud' && dbRef.current){ alsoWrite.forEach(({coll:c,obj})=>dbRef.current.child(c).child(obj.id).set(obj)); dbRef.current.child(coll).child(id).remove(); }
    else setState(s=>{ let next={...s}; alsoWrite.forEach(({coll:c,obj})=>{ next={...next,[c]:next[c].map(x=>x.id===obj.id?obj:x)}; }); next={...next,[coll]:next[coll].filter(x=>x.id!==id)}; saveLocal(next); return next; });
  },[mode]);

  const importData = useCallback((data)=>{
    const clean={ meta:data.meta||{appTitle:'MoeGo GTM OS'}, people:data.people||[], okrs:data.okrs||[], projects:data.projects||[], tasks:data.tasks||[], events:data.events||[] };
    if(mode==='cloud' && dbRef.current){ dbRef.current.set({ meta:clean.meta, people:arrToMap(clean.people), okrs:arrToMap(clean.okrs), projects:arrToMap(clean.projects), tasks:arrToMap(clean.tasks), events:arrToMap(clean.events) }); }
    else { setState(clean); saveLocal(clean); }
    flash('Data imported');
  },[mode,flash]);

  const resetSeed = useCallback(()=>{ importData(freshSeed()); },[importData]);

  const value = { mode,user,state,me,setMe,sync,toast,flash, signIn,signOut, writeEntity,writeMany,deleteEntity,importData,resetSeed, cfg };
  return React.createElement(Store.Provider,{value}, children);
}
/* ============================================================
   Derived data + entity actions
   ============================================================ */
function useGtm(){
  const s = useStore();
  const { state } = s;
  const people = state.people, okrs = state.okrs, projects = state.projects, tasks = state.tasks;
  const events = state.events || [];
  const maps = useMemo(()=>({
    person: arrToMap(people), okr: arrToMap(okrs), project: arrToMap(projects), task: arrToMap(tasks)
  }),[people,okrs,projects,tasks]);

  const tasksForProject = useCallback((pid)=> tasks.filter(t=>(t.projectIds||[]).includes(pid)),[tasks]);
  const projectsForOkr = useCallback((oid)=> projects.filter(p=>(p.okrIds||[]).includes(oid)),[projects]);
  const openNextSteps = (t)=> (t.nextSteps||[]).filter(n=>!n.done);

  // OKR confidence rolled up from project health
  const okrConfidence = useCallback((oid)=>{
    const ps = projectsForOkr(oid).filter(p=>p.status!=='done');
    if(!ps.length) return {label:'No active work',cls:'s-grey',health:'on_track'};
    if(ps.some(p=>p.health==='off_track'||p.status==='blocked')) return {label:'At risk',cls:'s-red',health:'off_track'};
    if(ps.some(p=>p.health==='at_risk')) return {label:'Watch',cls:'s-amber',health:'at_risk'};
    return {label:'On track',cls:'s-green',health:'on_track'};
  },[projectsForOkr]);

  // actions
  const { writeEntity, writeMany, deleteEntity } = s;
  const me = s.me;
  const logEvent=(type,entityType,entityId,meta)=> writeEntity('events',{id:uid('ev'),ts:nowISO(),actorId:me||'',type,entityType,entityId,meta:meta||{}});
  const dayDiff=(a,b)=>{ const pa=new Date(a.length<=10?a+'T00:00:00':a), pb=new Date(b.length<=10?b+'T00:00:00':b); return Math.round((pb-pa)/86400000); };
  const A = {
    savePerson:(p)=> writeEntity('people', p.id?p:{...p,id:uid('p')}),
    deletePerson:(id)=>{
      const projFix = projects.filter(p=>p.ownerId===id).map(p=>({...p, ownerId:''}));
      const taskFix = tasks.filter(t=>(t.ownerIds||[]).includes(id)).map(t=>({...t, ownerIds:t.ownerIds.filter(x=>x!==id)}));
      deleteEntity('people', id, [...projFix.map(o=>({coll:'projects',obj:o})), ...taskFix.map(o=>({coll:'tasks',obj:o}))]);
    },
    saveOkr:(o)=> writeEntity('okrs', o.id?{...o}:{...o,id:uid('o'),createdAt:nowISO()}),
    deleteOkr:(id)=>{
      const projFix = projects.filter(p=>(p.okrIds||[]).includes(id)).map(p=>({...p, okrIds:p.okrIds.filter(x=>x!==id)}));
      deleteEntity('okrs', id, projFix.map(o=>({coll:'projects',obj:o})));
    },
    saveProject:(p)=>{
      const prev = p.id ? maps.project[p.id] : null;
      const out = {...p, id:p.id||uid('pr'), createdAt:p.createdAt||(prev&&prev.createdAt)||nowISO(), lastActivity:nowISO()};
      if(out.dueDate && !out.dueDateOriginal) out.dueDateOriginal = (prev&&prev.dueDateOriginal) || out.dueDate;
      if(prev){
        if((prev.dueDate||'')!==(out.dueDate||'') && prev.dueDate && out.dueDate){
          const d=dayDiff(prev.dueDate,out.dueDate);
          logEvent('date_change','project',out.id,{name:out.name,from:prev.dueDate,to:out.dueDate,dir:d>0?'push':'pull',days:Math.abs(d)});
        }
        if(prev.status!=='done' && out.status==='done'){
          const onTime = !out.dueDate || dayDiff(todayStr(),out.dueDate)>=0;
          logEvent('completed','project',out.id,{name:out.name,onTime,dueDate:out.dueDate||'',original:out.dueDateOriginal||''});
        }
      }
      writeEntity('projects', out);
    },
    deleteProject:(id)=>{
      const taskFix = tasks.filter(t=>(t.projectIds||[]).includes(id)).map(t=>({...t, projectIds:t.projectIds.filter(x=>x!==id)}));
      deleteEntity('projects', id, taskFix.map(o=>({coll:'tasks',obj:o})));
    },
    saveTask:(t)=>{
      const prev = t.id ? maps.task[t.id] : null;
      const out = {...t, id:t.id||uid('t'), createdAt:t.createdAt||(prev&&prev.createdAt)||nowISO(), lastActivity:nowISO()};
      if(out.dueDate && !out.dueDateOriginal) out.dueDateOriginal = (prev&&prev.dueDateOriginal) || out.dueDate;
      if(prev){
        if((prev.dueDate||'')!==(out.dueDate||'') && prev.dueDate && out.dueDate){
          const d=dayDiff(prev.dueDate,out.dueDate);
          logEvent('date_change','task',out.id,{name:out.title,from:prev.dueDate,to:out.dueDate,dir:d>0?'push':'pull',days:Math.abs(d)});
        }
        if(prev.status!=='done' && out.status==='done'){
          const onTime = !out.dueDate || dayDiff(todayStr(),out.dueDate)>=0;
          logEvent('completed','task',out.id,{name:out.title,onTime,dueDate:out.dueDate||'',original:out.dueDateOriginal||''});
        }
      }
      writeEntity('tasks', out);
    },
    deleteTask:(id)=> deleteEntity('tasks', id),
    // next steps
    addNextStep:(task, text, dueDate)=>{
      const step={id:uid('ns'),text,dueDate:dueDate||'',createdAt:nowISO(),done:false,doneAt:null,completionNotes:''};
      writeEntity('tasks', {...task, nextSteps:[...(task.nextSteps||[]), step], lastActivity:nowISO()});
    },
    toggleNextStep:(task, nsId, completionNotes)=>{
      const step=(task.nextSteps||[]).find(n=>n.id===nsId);
      const goingDone = step && !step.done;
      const nextSteps=(task.nextSteps||[]).map(n=> n.id===nsId ? {...n, done:!n.done, doneAt:!n.done?nowISO():null, completionNotes:!n.done?(completionNotes||n.completionNotes||''):n.completionNotes} : n);
      writeEntity('tasks', {...task, nextSteps, lastActivity:nowISO()});
      if(goingDone){ const onTime=!step.dueDate || dayDiff(todayStr(),step.dueDate)>=0; logEvent('next_step_done','task',task.id,{name:task.title,onTime,text:step.text}); }
    },
    editNextStep:(task, nsId, patch)=>{
      const nextSteps=(task.nextSteps||[]).map(n=> n.id===nsId ? {...n, ...patch} : n);
      writeEntity('tasks', {...task, nextSteps, lastActivity:nowISO()});
    },
    deleteNextStep:(task, nsId)=>{
      writeEntity('tasks', {...task, nextSteps:(task.nextSteps||[]).filter(n=>n.id!==nsId), lastActivity:nowISO()});
    },
  };

  return { ...s, people, okrs, projects, tasks, events, maps, tasksForProject, projectsForOkr, openNextSteps, okrConfidence, A };
}

function resizeImageFile(file, cb){
  if(!file){ cb(''); return; }
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const S=176, c=document.createElement('canvas'); c.width=S; c.height=S;
      const ctx=c.getContext('2d');
      const scale=Math.max(S/img.width, S/img.height);
      const w=img.width*scale, h=img.height*scale;
      ctx.drawImage(img,(S-w)/2,(S-h)/2,w,h);
      try{ cb(c.toDataURL('image/jpeg',0.82)); }catch(e){ cb(''); }
    };
    img.onerror=()=>cb('');
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}
