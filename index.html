<style>
:root{
  /* Seattle Kraken: Deep Sea Blue (#001628) base, Boundless/Ice Blue accents, Red Alert (#E9072B) */
  /* ===== Two brand colors ===== */
  --deep:#001628;          /* deep sea blue - every dark surface + primary text/links */
  --deep-2:#001628;        /* kept as an alias of deep (was a 2nd gradient blue) */
  --accent:#8dd2d1;        /* seafoam - the single accent */
  --accent-700:#5cbfbd;    /* darker seafoam, primary-button hover */
  --accent-bg:#e8f7f6;     /* soft seafoam tint, highlights/hovers */
  /* legacy blue names repointed onto the two brand colors */
  --navy:#001628; --navy-700:#001628; --navy-600:#001628;
  --blue:#001628; --blue-500:#001628;
  --sky:#8dd2d1; --boundless:#8dd2d1; --ice:#8dd2d1;
  --sky-300:#aadedc; --sky-200:#cdeceb; --sky-100:#e8f7f6; --sky-50:#f1faf9;
  --ice-bg:#e8f7f6;
  /* neutrals - light blue-grey, harmonize with both brand colors */
  --bg:#e8f1fb; --panel:#ffffff; --panel-2:#f6fafd;
  --line:#e2ecf3; --line-strong:#ccdded;
  --ink:#03243c; --ink-soft:#2e4f68; --muted:#5f7a8c; --muted-2:#8fa6b4;
  /* semantic status colors - encode meaning (health / overdue / done), kept */
  --green:#11936a; --green-bg:#e3f5ee;
  --amber:#c2820f; --amber-bg:#fbefd6;
  --red:#e9072b; --red-bg:#fde2e6;
  --grey:#7e96a6; --grey-bg:#eef3f7;
  --shadow:0 1px 2px rgba(0,22,40,.05), 0 6px 20px rgba(0,22,40,.06);
  --shadow-lg:0 16px 48px rgba(0,22,40,.20);
  --r:12px; --r-sm:8px; --r-lg:16px;
  --side:240px;
  --font:'Source Sans 3',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--blue);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#d3e0ea;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#bcccda}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh}
.side{width:var(--side);flex:0 0 var(--side);background:#001628;color:#dbe9e8;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:40}
.brand{padding:18px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo{width:32px;height:32px;border-radius:9px;background:#8dd2d1;display:flex;align-items:center;justify-content:center;font-weight:800;color:#001628;font-size:15px;box-shadow:inset 0 0 0 1px rgba(0,22,40,.12)}
.brand b{font-size:15px;color:#fff;letter-spacing:-.2px;display:block;line-height:1.1}
.brand small{font-size:11px;color:#8fc7c6;letter-spacing:.3px}
.appsw{flex:1;min-width:0}
.appsw-btn{display:flex;align-items:center;gap:8px;width:100%;background:transparent;border:1px solid transparent;border-radius:9px;padding:4px 7px;text-align:left;cursor:pointer;transition:background .12s,border-color .12s}
.appsw-btn:hover{background:rgba(141,210,209,.14);border-color:rgba(141,210,209,.28)}
.appsw-chev{margin-left:auto;color:#8fc7c6;font-size:16px;line-height:1;transition:transform .18s ease;flex:0 0 auto}
.appsw-chev.open{transform:rotate(90deg)}
.appsw-menu{position:absolute;top:calc(100% + 6px);left:0;width:248px;background:#062033;border:1px solid rgba(141,210,209,.25);border-radius:12px;box-shadow:0 18px 44px rgba(0,0,0,.5);padding:6px;z-index:200}
.appsw-item{display:flex;align-items:center;gap:10px;width:100%;background:transparent;border:none;border-radius:9px;padding:9px 10px;cursor:pointer;color:#d3e7e6;text-align:left}
.appsw-item:hover{background:rgba(141,210,209,.14)}
.appsw-item.on{background:rgba(141,210,209,.18)}
.appsw-item b{display:block;color:#fff;font-size:13.5px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appsw-sub{display:block;font-size:10.5px;color:#8fc7c6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appsw-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:0 0 auto;box-shadow:0 0 0 3px rgba(141,210,209,.12)}
.hc-drawer{background:var(--panel);width:min(460px,96vw);height:100%;max-height:100vh;display:flex;flex-direction:column;box-shadow:-16px 0 40px rgba(0,0,0,.18);animation:hcDrawerIn .18s ease}
@keyframes hcDrawerIn{from{transform:translateX(30px);opacity:.6}to{transform:translateX(0);opacity:1}}
.hc-drawer-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);flex:0 0 auto}
.hc-drawer-b{padding:16px 18px;overflow-y:auto;flex:1}
.navhist{display:flex;gap:5px;margin-left:auto}
.navhist button{width:27px;height:27px;display:flex;align-items:center;justify-content:center;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#cfe7e6;font-size:14px;line-height:1;cursor:pointer;transition:background .12s,border-color .12s,color .12s,opacity .12s}
.navhist button:hover:not(:disabled){background:rgba(141,210,209,.20);border-color:rgba(141,210,209,.45);color:#fff}
.navhist button:disabled{opacity:.28;cursor:default}
.nav{padding:10px 10px;flex:1;overflow:auto}
.nav .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.9px;color:#7fb8b7;padding:14px 10px 6px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;color:#d3e7e6;font-weight:500;font-size:13.5px;margin:1px 0;cursor:pointer;transition:background .12s,color .12s;border:1px solid transparent}
.nav a .ic{width:17px;text-align:center;opacity:.92;font-size:14px}
.nav a:hover{background:rgba(141,210,209,.14);color:#fff}
.nav a.on{background:rgba(141,210,209,.20);color:#fff;border-color:rgba(141,210,209,.42)}
.nav a .badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;font-size:10.5px;font-weight:700;padding:1px 7px;min-width:18px;text-align:center}
.nav a.on .badge,.nav a:hover .badge{}
.side .who{border-top:1px solid rgba(255,255,255,.08);padding:11px 13px;display:flex;align-items:center;gap:9px;font-size:12.5px}
.side .who .av{flex:0 0 auto}
.side .who .meta{min-width:0}
.side .who .meta b{color:#fff;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side .who .meta span{color:#8fc7c6;font-size:11px}
.side .who button{margin-left:auto;background:transparent;border:1px solid rgba(255,255,255,.18);color:#bcd9d8;border-radius:7px;padding:4px 8px;font-size:11px}
.side .who button:hover{background:rgba(255,255,255,.08)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{position:sticky;top:0;z-index:30;background:rgba(232,240,251,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 32px 16px;display:flex;flex-direction:column;align-items:stretch;gap:13px}
.top-row{display:flex;align-items:center;gap:16px}
.top h1{font-size:21px;margin:0;letter-spacing:-.4px;font-weight:700;color:var(--ink)}
.top .sub{color:var(--muted);font-size:13px;margin-top:2px}
.top .sync{margin-left:auto;display:flex;align-items:center;gap:9px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sync .pill{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--ink-soft);font-weight:500}
.content{padding:30px 32px 100px;max-width:none;width:100%}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line-strong);color:var(--ink-soft);border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;transition:.12s}
.btn:hover{background:var(--sky-50);border-color:var(--sky-300)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#001628;box-shadow:0 1px 2px rgba(0,22,40,.18)}
.btn.primary:hover{background:var(--accent-700);border-color:var(--accent-700)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--blue)}
.btn.ghost:hover{background:var(--sky-100)}
.btn.danger{color:var(--red);border-color:#eccaca}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.icon{padding:7px 9px}
.btn[disabled]{opacity:.5;cursor:not-allowed}

/* ---------- Cards / panels ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.row{display:flex;gap:16px}
.grid{display:grid;gap:16px}
.muted{color:var(--muted)}
.tiny{font-size:11.5px}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;margin:0 0 10px}

/* ---------- Pills / chips ---------- */
.pill-s{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 9px;font-size:11.5px;font-weight:650;white-space:nowrap;border:1px solid transparent}
.s-green{background:var(--green-bg);color:#137a50;border-color:#c6ecd9}
.s-amber{background:var(--amber-bg);color:#9a6608;border-color:#f0deb5}
.s-red{background:var(--red-bg);color:#b23838;border-color:#f1c9c9}
.s-grey{background:var(--grey-bg);color:#54697d;border-color:#dde6ef}
.s-green-deep{background:var(--green);color:#fff;border-color:var(--green)}
.s-red-deep{background:var(--red);color:#fff;border-color:var(--red)}
.flagpill{white-space:normal;align-items:flex-start;line-height:1.4;max-width:100%}
.stamp-done{display:inline-flex;align-items:center;gap:4px;border:1.5px solid var(--green);color:var(--green);background:var(--green-bg);border-radius:6px;padding:2px 9px;font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.stamp-done.abd{border-color:var(--grey);color:#54697d;background:var(--grey-bg)}
.proj-done{opacity:.72}
.s-blue{background:var(--sky-100);color:var(--deep);border-color:var(--sky-200)}
.s-navy{background:#dcf0ef;color:var(--deep);border-color:#bfe4e3}
.hdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px rgba(0,0,0,.04)}
.pill-s.click{cursor:pointer;transition:box-shadow .12s,filter .12s}
.pill-s.click:hover{box-shadow:0 0 0 2px rgba(0,22,40,.12);filter:saturate(1.1)}

/* ---------- Disclosure (collapsible) ---------- */
.disc{border-top:1px solid var(--line)}
.disc-head{display:flex;align-items:center;gap:9px;padding:13px 2px;cursor:pointer;user-select:none}
.disc-head:hover .disc-title{color:var(--navy)}
.disc-title{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700;transition:color .12s}
.disc-count{font-size:11px;font-weight:700;color:var(--navy);background:var(--sky-100);border:1px solid var(--sky-200);border-radius:20px;padding:1px 8px}
.disc-chev{margin-left:auto;color:var(--muted-2);font-size:12px;transition:transform .18s ease}
.disc-chev.open{transform:rotate(90deg)}
.disc-body{padding:2px 2px 14px}

/* ---------- Target label ---------- */
.target{display:inline-flex;flex-direction:column;align-items:center;line-height:1.1}
.okr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(460px,1fr));gap:18px;align-content:start}
.okr-grid>.card{display:flex;flex-direction:column}
@media(max-width:980px){.okr-grid{grid-template-columns:1fr}}
.wl-h{font-size:9.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted-2);font-weight:700;margin:0 0 3px 8px}
.wl-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:12.5px}
.wl-row:hover{background:var(--sky-50)}
.wl-row b{font-weight:800;color:var(--ink)}
.wl-row .lab{color:var(--ink-soft)}
.wrow{display:flex;align-items:center;gap:10px;padding:9px 6px;border-top:1px solid var(--line);cursor:pointer}
.wrow:first-child{border-top:none}
.wrow:hover{background:var(--sky-50)}
.wrow-x{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.wrow-main{flex:1;min-width:0}
.wrow-t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wrow-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.wcell-date{flex:0 0 auto;min-width:48px;text-align:right;white-space:nowrap}
.wcell-status{flex:0 0 auto;min-width:96px;display:flex;justify-content:flex-start;align-items:center}
.cbox{width:18px;height:18px;flex:0 0 auto;border-radius:50%;border:1.5px solid var(--line-strong);cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;font-size:11px;font-weight:900;background:var(--panel);transition:border-color .12s,color .12s}
.cbox:hover{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.date-edit{cursor:pointer;border-bottom:1px dashed transparent;border-radius:3px;padding:0 2px}
.date-edit:hover{border-bottom-color:var(--muted-2);background:var(--sky-50)}
.ctray{position:fixed;right:24px;bottom:24px;width:370px;max-width:calc(100vw - 32px);background:var(--panel);border:1px solid var(--line-strong);border-radius:14px;box-shadow:0 18px 48px rgba(0,22,40,.24);z-index:300;padding:14px 15px;animation:ctrayIn .16s ease}
@keyframes ctrayIn{from{transform:translateY(12px);opacity:.4}to{transform:translateY(0);opacity:1}}
@media(max-width:560px){.ctray{right:12px;left:12px;bottom:12px;width:auto}}
.rs{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:var(--panel)}
.rs-h{display:flex;align-items:center;gap:9px;padding:11px 14px;background:var(--deep);border-bottom:none;cursor:pointer;user-select:none}
.rs-chev{color:#fff;font-size:10px;display:inline-block;transition:transform .15s ease;opacity:.85;flex:0 0 auto}
.rs-chev.open{transform:rotate(90deg)}
.rs-h.all{background:var(--accent)}
.rs-h.all .rs-t{color:var(--ink)}
.rs-h.all .rs-chev{color:var(--ink)}
.rs-h.all .rs-c{color:var(--ink);background:rgba(255,255,255,.6);border-color:rgba(0,22,40,.15)}
.rs-all{border-color:var(--accent)}
.rs-done{border-color:var(--green)}
.rs-h.done{background:var(--green)}
.mine-lbl{display:flex;align-items:center;gap:10px;margin:24px 0 12px;font-weight:800;font-size:13px;letter-spacing:.4px;text-transform:uppercase;color:var(--ink)}
.mine-lbl:after{content:"";flex:1;height:1px;background:var(--line)}
.rs-dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 0 2px rgba(255,255,255,.22)}
.rs-t{font-weight:700;font-size:13.5px;flex:1;color:#fff;letter-spacing:-.1px}
.rs-c{font-size:11px;font-weight:800;color:var(--navy);background:#fff;border:1px solid var(--sky-200);border-radius:20px;padding:1px 9px}
.rs-body{padding:2px 12px}
.rs-empty{padding:12px 14px;color:var(--muted);font-size:12.5px}
.rhythm-grid{column-width:440px;column-gap:18px}
.rhythm-grid>.rs{break-inside:avoid;-webkit-column-break-inside:avoid;margin-top:0}
.target .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted-2);font-weight:700}
.target .val{font-size:13.5px;font-weight:800;color:var(--navy);letter-spacing:-.1px}

/* ---------- Global search ---------- */
.search-wrap{position:relative;width:100%;max-width:none;min-width:0}
.search-inp{width:100%;border:1px solid var(--line-strong);border-radius:11px;padding:11px 14px 11px 40px;background:var(--panel);color:var(--ink);outline:none;font-size:14.5px;transition:.12s}
.search-inp:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(141,210,209,.35)}
.search-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted-2);font-size:15px;pointer-events:none;opacity:.7}
.search-pop{position:absolute;top:calc(100% + 8px);left:0;width:min(720px,calc(100vw - 40px));background:var(--panel);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-lg);max-height:66vh;overflow-y:auto;overflow-x:hidden;z-index:60;padding:8px}
.search-grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted-2);font-weight:700;padding:10px 12px 5px}
.search-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;cursor:pointer}
.search-item:hover{background:var(--sky-50)}
.search-item .si-t{flex:1 1 auto;min-width:0;font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-item .si-k{flex:0 0 auto;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted-2)}
.search-empty{padding:20px 14px;text-align:center;color:var(--muted);font-size:13.5px}
.av img{width:100%;height:100%;object-fit:cover;display:block}

/* ---------- Avatars ---------- */
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;letter-spacing:.2px;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
.av.lg{width:34px;height:34px;font-size:13px}
.av.md{width:30px;height:30px;font-size:12px}
.av.xl{width:58px;height:58px;font-size:20px;border-radius:50%}
.av.sm{width:21px;height:21px;font-size:9.5px}
.av-stack{display:inline-flex}
.av-stack .av{margin-left:-7px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25),0 0 0 2px var(--panel)}
.av-stack .av:first-child{margin-left:0}

/* ---------- Tables ---------- */
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:1}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background .1s}
.tbl tbody tr:hover{background:var(--sky-50)}
.tbl .title-cell{font-weight:650;color:var(--ink)}
.tbl .title-cell small{display:block;font-weight:500;color:var(--muted);font-size:11.5px;margin-top:2px}

/* ---------- Forms ---------- */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:650;color:var(--ink-soft);margin-bottom:5px}
.field .hint{font-weight:500;color:var(--muted-2);font-size:11px;margin-left:6px}

function useGtm(){
  const s = useStore();
  const { state } = s;
  const people = state.people, okrs = state.okrs, projects = state.projects, tasks = state.tasks;
  const events = state.events || [];
  const maps = useMemo(()=>({
    person: arrToMap(people), okr: arrToMap(okrs), project: arrToMap(projects), task: arrToMap(tasks)
  }),[people,okrs,projects,tasks]);

  const tasksForProject = useCallback((pid)=> tasks.filter(t=>(t.projectIds||[]).includes(pid)),[tasks]);
  const projectsForOkr = useCallback((oid)=> projects.filter(p=>(p.okrIds||[]).includes(oid)),[projects]);
  const openNextSteps = (t)=> (t.nextSteps||[]).filter(n=>!n.done);

  // Objective Health rolled up from project health - 5 graduated levels, proportional
  const okrConfidence = useCallback((oid)=>{
    const ps = projectsForOkr(oid).filter(p=>!isClosedStatus(p.status));
    const N = ps.length;
    if(!N) return {label:'No active work',cls:'s-grey',health:'on_track',level:0};
    let s2=0, s1=0;
    ps.forEach(p=>{ if(p.health==='off_track'||p.status==='blocked') s2++; else if(p.health==='at_risk') s1++; });
    const worstFrac = s2/N, riskFrac = (s1+s2)/N;
    if(s2===0 && s1===0)           return {label:'Very Strong',cls:'s-green-deep',health:'on_track',level:5};
    if(s2===0 && riskFrac<=1/3)    return {label:'Strong',cls:'s-green',health:'on_track',level:4};
    if(worstFrac<=1/3)             return {label:'Light Risk',cls:'s-amber',health:'at_risk',level:3};
    if(worstFrac<1)                return {label:'Off Track',cls:'s-red',health:'off_track',level:2};
    return {label:'Entirely Blocked',cls:'s-red-deep',health:'off_track',level:1};
  },[projectsForOkr]);

  // actions
  const { writeEntity, writeMany, deleteEntity, writeMeta } = s;
  const me = s.me;
  const gradePassword = (state.meta && state.meta.gradePassword) || 'Greta';
  const logEvent=(type,entityType,entityId,meta)=> writeEntity('events',{id:uid('ev'),ts:nowISO(),actorId:me||'',type,entityType,entityId,meta:meta||{}});
  const dayDiff=(a,b)=>{ const pa=new Date(a.length<=10?a+'T00:00:00':a), pb=new Date(b.length<=10?b+'T00:00:00':b); return Math.round((pb-pa)/86400000); };
  const A = {
    savePerson:(p)=> writeEntity('people', p.id?p:{...p,id:uid('p')}),
    deletePerson:(id)=>{
      const projFix = projects.filter(p=>p.ownerId===id).map(p=>({...p, ownerId:''}));
      const taskFix = tasks.filter(t=>(t.ownerIds||[]).includes(id)).map(t=>({...t, ownerIds:t.ownerIds.filter(x=>x!==id)}));
      deleteEntity('people', id, [...projFix.map(o=>({coll:'projects',obj:o})), ...taskFix.map(o=>({coll:'tasks',obj:o}))]);
    },
    saveOkr:(o)=> writeEntity('okrs', o.id?{...o}:{...o,id:uid('o'),createdAt:nowISO()}),
    deleteOkr:(id)=>{
      const projFix = projects.filter(p=>(p.okrIds||[]).includes(id)).map(p=>({...p, okrIds:p.okrIds.filter(x=>x!==id)}));
      deleteEntity('okrs', id, projFix.map(o=>({coll:'projects',obj:o})));
    },
    saveProject:(p)=>{
      const prev = p.id ? maps.project[p.id] : null;
      const out = {...p, id:p.id||uid('pr'), createdAt:p.createdAt||(prev&&prev.createdAt)||nowISO(), lastActivity:nowISO()};
      if(out.dueDate && !out.dueDateOriginal) out.dueDateOriginal = (prev&&prev.dueDateOriginal) || out.dueDate;
      if(prev){
        if((prev.dueDate||'')!==(out.dueDate||'') && prev.dueDate && out.dueDate){
          const d=dayDiff(prev.dueDate,out.dueDate);
          logEvent('date_change','project',out.id,{name:out.name,from:prev.dueDate,to:out.dueDate,dir:d>0?'push':'pull',days:Math.abs(d)});
        }
        if(prev.status!=='done' && out.status==='done'){
          const onTime = !out.dueDate || dayDiff(todayStr(),out.dueDate)>=0;
          logEvent('completed','project',out.id,{name:out.name,onTime,dueDate:out.dueDate||'',original:out.dueDateOriginal||''});
        }
      }
      writeEntity('projects', out);
    },
    deleteProject:(id)=>{
      const taskFix = tasks.filter(t=>(t.projectIds||[]).includes(id)).map(t=>({...t, projectIds:t.projectIds.filter(x=>x!==id)}));
      deleteEntity('projects', id, taskFix.map(o=>({coll:'tasks',obj:o})));
    },
    saveTask:(t)=>{
      const prev = t.id ? maps.task[t.id] : null;
      const out = {...t, id:t.id||uid('t'), createdAt:t.createdAt||(prev&&prev.createdAt)||nowISO(), lastActivity:nowISO()};
      if(out.dueDate && !out.dueDateOriginal) out.dueDateOriginal = (prev&&prev.dueDateOriginal) || out.dueDate;
      if(prev){
        if((prev.dueDate||'')!==(out.dueDate||'') && prev.dueDate && out.dueDate){
          const d=dayDiff(prev.dueDate,out.dueDate);
          logEvent('date_change','task',out.id,{name:out.title,from:prev.dueDate,to:out.dueDate,dir:d>0?'push':'pull',days:Math.abs(d)});
        }
        if(prev.status!=='done' && out.status==='done'){
          const onTime = !out.dueDate || dayDiff(todayStr(),out.dueDate)>=0;
          logEvent('completed','task',out.id,{name:out.title,onTime,dueDate:out.dueDate||'',original:out.dueDateOriginal||''});
        }
      }
      writeEntity('tasks', out);
    },
    deleteTask:(id)=> deleteEntity('tasks', id),
    // next steps
    addNextStep:(task, text, dueDate)=>{
      const step={id:uid('ns'),text,dueDate:dueDate||'',createdAt:nowISO(),done:false,doneAt:null,completionNotes:''};
      writeEntity('tasks', {...task, nextSteps:[...(task.nextSteps||[]), step], lastActivity:nowISO()});
    },
    toggleNextStep:(task, nsId, completionNotes)=>{
      const step=(task.nextSteps||[]).find(n=>n.id===nsId);
      const goingDone = step && !step.done;
      const nextSteps=(task.nextSteps||[]).map(n=> n.id===nsId ? {...n, done:!n.done, doneAt:!n.done?nowISO():null, completionNotes:!n.done?(completionNotes||n.completionNotes||''):n.completionNotes} : n);
      writeEntity('tasks', {...task, nextSteps, lastActivity:nowISO()});
      if(goingDone){ const onTime=!step.dueDate || dayDiff(todayStr(),step.dueDate)>=0; logEvent('next_step_done','task',task.id,{name:task.title,onTime,text:step.text}); }
    },
    editNextStep:(task, nsId, patch)=>{
      const nextSteps=(task.nextSteps||[]).map(n=> n.id===nsId ? {...n, ...patch} : n);
      writeEntity('tasks', {...task, nextSteps, lastActivity:nowISO()});
    },
    deleteNextStep:(task, nsId)=>{
      writeEntity('tasks', {...task, nextSteps:(task.nextSteps||[]).filter(n=>n.id!==nsId), lastActivity:nowISO()});
    },
    resetGrade:(personId)=>{ const p=maps.person[personId]; if(p) writeEntity('people', {...p, gradeResetAt:nowISO()}); },
    resetAllGrades:()=>{ const ts=nowISO(); people.forEach(p=>writeEntity('people', {...p, gradeResetAt:ts})); },
    setGradePassword:(pw)=> writeMeta({gradePassword:pw}),
    addAllowedEmail:(email)=>{ const e=String(email||'').trim().toLowerCase(); if(!e) return false; const cur=emailsArr(state.meta).map(x=>String(x).toLowerCase()); const base=ALLOWED_EMAILS.map(x=>x.toLowerCase()); if(base.includes(e)||cur.includes(e)) return false; writeMeta({allowedEmails:[...emailsArr(state.meta), e]}); return true; },
    removeAllowedEmail:(email)=>{ const e=String(email||'').toLowerCase(); const cur=emailsArr(state.meta); writeMeta({allowedEmails:cur.filter(x=>String(x).toLowerCase()!==e)}); },
  };

  const allowedEmails = emailsArr(state.meta);
  return { ...s, people, okrs, projects, tasks, events, gradePassword, allowedEmails, maps, tasksForProject, projectsForOkr, openNextSteps, okrConfidence, A };
}

function resizeImageFile(file, cb){
  if(!file){ cb(''); return; }
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const S=176, c=document.createElement('canvas'); c.width=S; c.height=S;
      const ctx=c.getContext('2d');
      const scale=Math.max(S/img.width, S/img.height);
      const w=img.width*scale, h=img.height*scale;
      ctx.drawImage(img,(S-w)/2,(S-h)/2,w,h);
      try{ cb(c.toDataURL('image/jpeg',0.82)); }catch(e){ cb(''); }
    };
    img.onerror=()=>cb('');
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

function hcCalcPeople(hc){
  const S = hcEffSettings(hc.settings);
  const leaders = hcLeaders(hc);
  const employees = (hc.employees||[]).filter(e=>hcStatus(e)==='active');
  const departedRecs = (hc.employees||[]).filter(e=>hcStatus(e)==='departed');
  const log = hc.attritionLog||[];

  const tenures = employees.map(e=>hcTenureMo(e.startDate)).filter(v=>v!=null);
  const levels = employees.map(e=>e.level).filter(v=>v!=null&&!isNaN(v));
  const otes = employees.map(e=>e.ote).filter(v=>v!=null);

  const perfMix = {Good:0,Poor:0,'Kev Direct':0,'N/A':0};
  employees.forEach(e=>{ const p=e.performance||'N/A'; perfMix[p]=(perfMix[p]||0)+1; });

  const tenureBuckets = {'<6mo':0,'6-12mo':0,'1-2y':0,'2y+':0};
  employees.forEach(e=>{ const m=hcTenureMo(e.startDate); if(m==null)return; if(m<6)tenureBuckets['<6mo']++; else if(m<12)tenureBuckets['6-12mo']++; else if(m<24)tenureBuckets['1-2y']++; else tenureBuckets['2y+']++; });

  const levelDist = {}; employees.forEach(e=>{ const l='L'+(e.level||'?'); levelDist[l]=(levelDist[l]||0)+1; });
  const countryDist = {}; employees.forEach(e=>{ const c=e.country||'Other'; countryDist[c]=(countryDist[c]||0)+1; });

  const newHires = employees.filter(e=>{ const m=hcTenureMo(e.startDate); return m!=null && m<3; });

  // per-org rollups
  const byLeader = {};
  leaders.forEach(l=>{
    const es = employees.filter(e=>e.leaderId===l.id);
    const ten = es.map(e=>hcTenureMo(e.startDate)).filter(v=>v!=null);
    const lv = es.map(e=>e.level).filter(v=>v!=null&&!isNaN(v));
    const poor = es.filter(e=>e.performance==='Poor').length;
    byLeader[l.id]={
      label:l.label, kev:l.kev, headcount:es.length, onLeave:es.filter(e=>e.onLeave).length,
      avgTenure:hcMean(ten), medTenure:hcMedian(ten), avgLevel:hcMean(lv),
      poor, poorPct:hcPct(poor,es.length),
      negAttr:es.filter(e=>e.attrition==='Negative Attrition').length,
      posAttr:es.filter(e=>e.attrition==='Positive Attrition').length,
      promoAttr:es.filter(e=>e.attrition==='Promotion Attrition').length,
      attr:es.filter(e=>e.attrition).length,
    };
  });

  // per-team rollups (team tag membership; whole-person, not FTE-split, for people metrics)
  const byTeam = {};
  S.teamTags.forEach(t=>{
    const es = employees.filter(e=>(e.teamTags||[]).includes(t));
    if(!es.length) return;
    const ten = es.map(e=>hcTenureMo(e.startDate)).filter(v=>v!=null);
    const lv = es.map(e=>e.level).filter(v=>v!=null&&!isNaN(v));
    const poor = es.filter(e=>e.performance==='Poor').length;
    byTeam[t]={ headcount:es.length, avgTenure:hcMean(ten), medTenure:hcMedian(ten), avgLevel:hcMean(lv),
      poor, poorPct:hcPct(poor,es.length), attr:es.filter(e=>e.attrition).length };
  });

  const totalHC = employees.length;
  const activeFlags = employees.filter(e=>e.attrition).length;
  return {
    leaders, totalHC, onLeave: employees.filter(e=>e.onLeave).length,
    openReqs:(hc.employees||[]).filter(e=>hcStatus(e)==='open').length,
    avgTenure:hcMean(tenures), medTenure:hcMedian(tenures),
    avgLevel:hcMean(levels), avgOTE:hcMean(otes),
    poor: perfMix.Poor, poorPct:hcPct(perfMix.Poor,totalHC),
    perfMix, tenureBuckets, levelDist, countryDist,
    newHires: newHires.length,
    activeFlags, attrRate:hcPct(activeFlags,totalHC),
    negActive: employees.filter(e=>e.attrition==='Negative Attrition').length,
    posActive: employees.filter(e=>e.attrition==='Positive Attrition').length,
    promoActive: employees.filter(e=>e.attrition==='Promotion Attrition').length,
    departed: departedRecs.length,
    departedNeg: departedRecs.filter(e=>e.attritionType==='Negative Attrition').length,
    departedPos: departedRecs.filter(e=>e.attritionType==='Positive Attrition').length,
    departedPromo: departedRecs.filter(e=>e.attritionType==='Promotion Attrition').length,
    byLeader, byTeam,
  };
}

const useHcCtx = ()=>useContext(HcCtx)||HC_CTX_FALLBACK;

function useHc(){
  const store = useStore();
  const st = store.state;
  const hc = useMemo(()=>({
    employees: st.hc_employees||[],
    reqs: st.hc_reqs||[],
    attritionLog: st.hc_attritionLog||[],
    leaders: st.hc_leaders||[],
    history: st.hc_history||[],
    settings: st.hcSettings||{},
  }),[st.hc_employees,st.hc_reqs,st.hc_attritionLog,st.hc_leaders,st.hc_history,st.hcSettings]);

  const fin = useMemo(()=>hcCalcFin(hc),[hc]);
  const people = useMemo(()=>hcCalcPeople(hc),[hc]);
  const effLeaders = fin.leaders;
  const S = fin.S;

  const writeHistory=(o)=>store.writeEntity('hc_history',o);
  const historyFor=(empId)=>(hc.history||[]).filter(h=>h.empId===empId);
  const records = hc.employees||[];
  const activeEmps = records.filter(e=>hcStatus(e)==='active');
  const openReqs = records.filter(e=>hcStatus(e)==='open');
  const nextReq = hcNextReq(records);

  return {
    ...hc, fin, people, effLeaders, S,
    records, activeEmps, openReqs, nextReq,
    // writers (reuse the generic store entity writers)
    writeEmp:(o)=>store.writeEntity('hc_employees',o),
    deleteEmp:(id)=>store.deleteEntity('hc_employees',id),
    writeReq:(o)=>store.writeEntity('hc_reqs',o),
    deleteReq:(id)=>store.deleteEntity('hc_reqs',id),
    writeLog:(o)=>store.writeEntity('hc_attritionLog',o),
    deleteLog:(id)=>store.deleteEntity('hc_attritionLog',id),
    writeLeader:(o)=>store.writeEntity('hc_leaders',o),
    deleteLeader:(id)=>store.deleteEntity('hc_leaders',id),
    writeSettings:(patch)=>store.writeHcSettings(patch),
    writeHistory, deleteHistory:(id)=>store.deleteEntity('hc_history',id), historyFor,
    // req + hire lifecycle
    createReq:(fields)=>{
      const id=uid('e'); const reqNumber=hcNextReq(records);
      store.writeEntity('hc_employees', Object.assign({ id, reqNumber, status:'open', name:'', ote:null, country:'USA', startDate:'', performance:'Good', attrition:'', onLeave:false, notes:'', c1:'CAC',w1:100,t1:'',ch1:'',c2:'',w2:0,t2:'',ch2:'',c3:'',w3:0,t3:'',ch3:'', openedAt:nowISO() }, fields));
      writeHistory({id:uid('hh'), empId:id, type:'opened', ts:nowISO(), effectiveDate:nowISO().slice(0,10), title:fields.title||'', level:fields.level, leaderId:fields.leaderId, note:fields.openReason||''});
      return reqNumber;
    },
    hireReq:(req,next)=>{
      store.writeEntity('hc_employees', Object.assign({}, req, next, {status:'active', hiredAt:nowISO()}));
      writeHistory({id:uid('hh'), empId:req.id, type:'hired', ts:nowISO(), effectiveDate:next.startDate||nowISO().slice(0,10), name:next.name||'', role:next.role||req.role||'', title:next.title||req.title||'', level:next.level||req.level, leaderId:next.leaderId||req.leaderId});
    },
    setLeave:(emp,val)=>store.writeEntity('hc_employees', {...emp, onLeave:!!val}),
    // lifecycle actions
    attritEmp:(emp,{attritionType,exitDate,reason})=>{
      store.writeEntity('hc_employees', {...emp, status:'departed', attritionType, exitDate:exitDate||nowISO().slice(0,10), exitReason:reason||'', departedAt:nowISO(), attrition:'', onLeave:false});
      writeHistory({id:uid('hh'), empId:emp.id, type:'attrition', ts:nowISO(), attritionType, exitDate:exitDate||nowISO().slice(0,10), reason:reason||'', roleAt:emp.role||'', titleAt:emp.title||'', levelAt:emp.level, leaderIdAt:emp.leaderId});
    },
    reactivateEmp:(emp)=>{
      store.writeEntity('hc_employees', {...emp, status:'active', attritionType:'', exitDate:'', exitReason:'', departedAt:''});
    },
    moveEmp:(prev,next,kind,{effectiveDate,note})=>{
      store.writeEntity('hc_employees', next);
      writeHistory({id:uid('hh'), empId:prev.id, type:kind, ts:nowISO(), effectiveDate:effectiveDate||nowISO().slice(0,10), note:note||'',
        fromRole:prev.role||'', toRole:next.role||'', fromTitle:prev.title||'', toTitle:next.title||'',
        fromLevel:prev.level, toLevel:next.level, fromManager:prev.manager||'', toManager:next.manager||'',
        fromLeaderId:prev.leaderId, toLeaderId:next.leaderId, fromOte:prev.ote||null, toOte:next.ote||null});
    },
    flash: store.flash,
  };
}

function hcMonthLabel(y,m){ const names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return names[((m%12)+12)%12]+" '"+String(y).slice(2); }
function hcMonthEnd(y,m){ return new Date(Date.UTC(y,m+1,0)).toISOString().slice(0,10); }
function hcInMonth(dateStr,y,m){ if(!dateStr)return false; const mm=String(m+1).padStart(2,'0'); return String(dateStr).slice(0,7)===(y+'-'+mm); }
function hcActiveAt(e,dateStr){
  if(!e.startDate||String(e.startDate).slice(0,10)>dateStr) return false;
  if(e.status==='departed' && e.exitDate && String(e.exitDate).slice(0,10)<=dateStr) return false;
  return true;
}
function hcMonthlyTurnover(hc,months){
  months=months||12;
  const emps=hc.employees||[];
  const now=new Date();
  const series=[];
  for(let i=months-1;i>=0;i--){
    const d=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth()-i,1));
    const y=d.getUTCFullYear(), m=d.getUTCMonth();
    const monthEnd=hcMonthEnd(y,m), prevEnd=hcMonthEnd(y,m-1);
    const hires=emps.filter(e=>hcInMonth(e.startDate,y,m)).length;
    const departures=emps.filter(e=>e.status==='departed'&&hcInMonth(e.exitDate,y,m)).length;
    const endHC=emps.filter(e=>hcActiveAt(e,monthEnd)).length;
    const startHC=emps.filter(e=>hcActiveAt(e,prevEnd)).length;
    const avgHC=(startHC+endHC)/2;
    const rate=avgHC>0?(departures/avgHC)*100:0;
    series.push({y,m,label:hcMonthLabel(y,m),hires,departures,startHC,endHC,avgHC,rate});
  }
  const totDep=series.reduce((a,s)=>a+s.departures,0);
  const totHire=series.reduce((a,s)=>a+s.hires,0);
  const avgHCwindow=hcMean(series.map(s=>s.avgHC))||0;
  const annualized=avgHCwindow>0?(totDep/avgHCwindow)*100:0;
  return {series,totDep,totHire,avgHCwindow,annualized,net:totHire-totDep};
}
